name: TOC Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  toc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require TOC section in posts and pages
        run: |
          set -euo pipefail
          fail=0
          shopt -s nullglob
          for f in posts/*.md pages/*.md; do
            base=$(basename "$f")
            if [[ "$base" == .gitkeep ]]; then
              continue
            fi
            if ! grep -qE '^## (目录|Table of Contents)$' "$f"; then
              echo "missing TOC heading: $f"
              fail=1
            fi
          done
          if [[ "$fail" -ne 0 ]]; then
            echo "Each post/page must contain '## 目录' or '## Table of Contents'."
            exit 1
          fi
          echo "TOC check passed."
